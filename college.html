    /* ── NAVBAR ── */
    nav {

      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);

      padding: 0 5%;
      display: flex; align-items: center; justify-content: space-between;

    }
    .logo { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 20px; color: #0B1E3D; text-decoration: none; }

      background: #EEF1F8; color: #0B1E3D;
      border: none; padding: 8px 18px; border-radius: 8px;
      font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
      cursor: pointer; text-decoration: none; transition: background 0.2s;
    }
    .back-btn:hover { background: #dde3f0; }
 
    /* ── HERO BANNER ── */
    .college-hero {
      background: linear-gradient(135deg, #0B1E3D 0%, #1A3A6E 60%, #1A56DB 100%);
      padding: 48px 5% 40px;
      position: relative; overflow: hidden;
    }
    .college-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 80% 50%, rgba(255,107,53,0.12) 0%, transparent 60%);
    }
    .hero-inner {
      max-width: 960px; margin: 0 auto;
      display: flex; align-items: center; gap: 28px;
      position: relative;
    }
    .college-logo-big {
      width: 80px; height: 80px; border-radius: 16px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Sora', sans-serif; font-weight: 700; font-size: 22px;
      color: #fff; flex-shrink: 0;
    }
    .hero-text h1 {
      font-family: 'Sora', sans-serif; font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700; color: #fff; margin-bottom: 8px;
    }
    .hero-location { font-size: 15px; color: rgba(255,255,255,0.7); margin-bottom: 14px; }
    .hero-badges { display: flex; flex-wrap: wrap; gap: 8px; }
    .hbadge {
      font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 99px;
      background: rgba(255,255,255,0.15); color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .hbadge-gold { background: #F5A623; color: #0B1E3D; border: none; }
 
    /* ── QUICK STATS ROW ── */
    .quick-stats {
      background: #fff;
      border-bottom: 1px solid #EEF1F8;
    }
    .qs-inner {
      max-width: 960px; margin: 0 auto;
      display: flex; flex-wrap: wrap;
    }
    .qs-item {
      flex: 1; min-width: 140px;
      padding: 20px 24px; text-align: center;
      border-right: 1px solid #EEF1F8;
    }
    .qs-item:last-child { border-right: none; }
    .qs-val { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 700; color: #1A56DB; }
    .qs-label { font-size: 12px; color: #9AA3B5; margin-top: 3px; }
 
    /* ── MAIN LAYOUT ── */
    .main-wrap {
      max-width: 960px; margin: 32px auto; padding: 0 5%;
      display: grid; grid-template-columns: 1fr 320px; gap: 24px;
    }
 
    /* ── CARDS ── */
    .card {
      background: #fff; border: 1px solid #EEF1F8;
      border-radius: 16px; padding: 24px; margin-bottom: 20px;
    }
    .card-heading {
      font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 600;
      color: #0B1E3D; margin-bottom: 18px;
      padding-bottom: 12px; border-bottom: 1px solid #EEF1F8;
      display: flex; align-items: center; gap: 8px;
    }
 
    /* ── COURSES TABLE ── */
    .courses-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .courses-table th {
      background: #F8F9FC; color: #9AA3B5; font-weight: 500;
      padding: 10px 14px; text-align: left; font-size: 12px;
      border-bottom: 1px solid #EEF1F8;
    }
    .courses-table td {
      padding: 12px 14px; border-bottom: 1px solid #EEF1F8;
      color: #0B1E3D;
    }
    .courses-table tr:last-child td { border-bottom: none; }
    .courses-table tr:hover td { background: #F8F9FC; }
    .course-badge {
      display: inline-block; font-size: 11px; padding: 3px 8px;
      border-radius: 99px; background: #E8F0FE; color: #1A56DB; font-weight: 500;
    }
 
    /* ── ABOUT ── */
    .about-text { font-size: 14px; color: #3D4560; line-height: 1.8; }
 
    /* ── FACILITIES ── */
    .facilities-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    .facility-item {
      background: #F8F9FC; border: 1px solid #EEF1F8;
      border-radius: 10px; padding: 14px 10px; text-align: center;
    }
    .facility-icon { font-size: 22px; margin-bottom: 6px; }
    .facility-name { font-size: 12px; color: #3D4560; font-weight: 500; }
 
    /* ── SIDEBAR ── */
    .contact-card { background: #fff; border: 1px solid #EEF1F8; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .contact-heading {
      font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 600;
      color: #0B1E3D; margin-bottom: 16px;
    }
    .contact-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid #EEF1F8;
    }
    .contact-row:last-of-type { border-bottom: none; }
    .contact-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: #E8F0FE; display: flex; align-items: center;
      justify-content: center; font-size: 16px; flex-shrink: 0;
    }
    .contact-label { font-size: 11px; color: #9AA3B5; margin-bottom: 2px; }
    .contact-val { font-size: 13px; font-weight: 500; color: #0B1E3D; word-break: break-all; }
    .contact-val a { color: #1A56DB; text-decoration: none; }
    .contact-val a:hover { text-decoration: underline; }
 
    .apply-btn {
      display: block; width: 100%; padding: 13px;
      background: #1A56DB; color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif;
      cursor: pointer; text-align: center; text-decoration: none;
      transition: background 0.2s; margin-top: 16px;
    }
    .apply-btn:hover { background: #1347c0; }
    .save-btn {
      display: block; width: 100%; padding: 11px;
      background: #fff; color: #1A56DB;
      border: 1.5px solid #1A56DB; border-radius: 10px;
      font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
      cursor: pointer; text-align: center;
      transition: background 0.2s; margin-top: 10px;
    }
    .save-btn:hover { background: #E8F0FE; }

    .facts-list li {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #EEF1F8;

    .facts-list li:last-child { border-bottom: none; }

    .fact-val { font-weight: 600; color: #0B1E3D; text-align: right; }
