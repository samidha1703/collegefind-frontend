    { id:25, name:"Manipal Inst of Tech", abbr:"MIT", location:"Manipal, Karnataka", state:"Karnataka", type:"Engineering", fees:420000, feesDisplay:"₹4.2L/yr", exam:"JEE Main", rank:"NIRF Engg #41", established:"1957", type2:"Private (Deemed)", affiliation:"Manipal Academy", courses:["B.Tech CSE","B.Tech AI","B.Tech Robotics","B.Tech ECE","M.Tech CSE","MBA Tech","PhD"], facilities:["Library","Hostel","Sports Complex","Robotics Lab","Cafeteria","Wi-Fi","Innovation Studio"], phone:"+91-820-2923000", email:"admissions@manipal.edu", website:"manipal.edu/mit" }
  ];
 
  let selected = [null, null, null];
 
  function populateDropdowns() {
    const opts = colleges.map(c => `<option value="${c.id}">${c.name} (${c.type})</option>`).join('');
    [0,1,2].forEach(i => {
      document.getElementById('select'+i).innerHTML = '<option value="">-- Select a College --</option>' + opts;
    });
  }
 
  function selectCollege(slot, id) {
    if (!id) { clearSlot(slot); return; }
    selected[slot] = colleges.find(c => c.id === parseInt(id));
    document.getElementById('slot'+slot).classList.add('filled');
    document.getElementById('name'+slot).style.display = 'block';
    document.getElementById('name'+slot).textContent = selected[slot].name;
    document.getElementById('clear'+slot).style.display = 'flex';
    updateBtn();
  }
 
  function clearSlot(slot) {
    selected[slot] = null;
    document.getElementById('select'+slot).value = '';
    document.getElementById('slot'+slot).classList.remove('filled');
    document.getElementById('name'+slot).style.display = 'none';
    document.getElementById('clear'+slot).style.display = 'none';
    updateBtn();
  }
 
  function updateBtn() {
    const n = selected.filter(s => s !== null).length;
    document.getElementById('compareBtn').disabled = n < 2;
    document.getElementById('hintText').textContent =
      n < 2 ? 'Select at least 2 colleges to compare' :
      n === 2 ? '✅ Ready! Click Compare Now' : '✅ 3 colleges selected!';
  }
 
  function buildComparison() {
    const list = selected.filter(s => s !== null);
    if (list.length < 2) return;
    document.getElementById('compareSection').classList.add('show');
    document.getElementById('resetWrap').style.display = 'block';
    buildVerdicts(list);
    buildTable(list);
    document.getElementById('compareSection').scrollIntoView({ behavior: 'smooth' });
  }
 
  function buildVerdicts(list) {
    const getRankNum = c => parseInt(c.rank.match(/\d+/)?.[0] || 999);
    const verdicts = [
      { label: '🏆 Best NIRF Rank',   winner: list.reduce((a,b) => getRankNum(a) <= getRankNum(b) ? a : b).name },
      { label: '💰 Lowest Fees',       winner: list.reduce((a,b) => a.fees < b.fees ? a : b).name },
      { label: '📚 Most Courses',      winner: list.reduce((a,b) => a.courses.length >= b.courses.length ? a : b).name },
      { label: '🏛️ Oldest College',   winner: list.reduce((a,b) => parseInt(a.established) < parseInt(b.established) ? a : b).name },
      { label: '🏫 Most Facilities',   winner: list.reduce((a,b) => a.facilities.length >= b.facilities.length ? a : b).name },
    ];
    document.getElementById('verdictGrid').innerHTML = verdicts.map(v => `
      <div class="verdict-card">
        <div class="verdict-label">${v.label}</div>
        <div class="verdict-winner">${v.winner}</div>
        <div class="verdict-badge">Winner 🏆</div>
      </div>`).join('');
  }
 
  function buildTable(list) {
    const minFees = Math.min(...list.map(c => c.fees));
    const maxFees = Math.max(...list.map(c => c.fees));
    const getRankNum = c => parseInt(c.rank.match(/\d+/)?.[0] || 999);
    const minRank = Math.min(...list.map(getRankNum));
    const maxCourses = Math.max(...list.map(c => c.courses.length));
    const maxFacilities = Math.max(...list.map(c => c.facilities.length));
 
    const header = `<tr class="header-row">
      <th>Parameter</th>
      ${list.map(c => `<th><div class="col-abbr">${c.abbr}</div>${c.name}<br><span class="col-rank">${c.rank}</span></th>`).join('')}
    </tr>`;
 
    const rows = [
      { cat: '📍 BASIC INFO' },
      { label: 'Location',     fn: c => c.location },
      { label: 'State',        fn: c => c.state },
      { label: 'Established',  fn: c => c.established },
      { label: 'Type',         fn: c => `<span class="cell-tag tag-blue">${c.type2}</span>` },
      { label: 'Affiliation',  fn: c => c.affiliation },
      { cat: '📊 RANKING & FEES' },
      { label: 'NIRF 2024 Rank', fn: c => `<strong>${c.rank}</strong>`, hl: c => getRankNum(c) === minRank ? 'best' : '' },
      { label: 'Annual Fees',    fn: c => c.feesDisplay, hl: c => c.fees === minFees ? 'best' : c.fees === maxFees ? 'worst' : '' },
      { label: 'Entrance Exam',  fn: c => `<span class="cell-tag tag-orange">${c.exam}</span>` },
      { cat: '🎓 COURSES' },
      { label: 'Stream',        fn: c => `<span class="cell-tag tag-blue">${c.type}</span>` },
      { label: 'No. of Courses',fn: c => `<strong>${c.courses.length}</strong>`, hl: c => c.courses.length === maxCourses ? 'best' : '' },
      { label: 'Top Courses',   fn: c => c.courses.slice(0,3).map(x => `<span class="cell-tag tag-green">${x}</span>`).join('') },
      { cat: '🏫 CAMPUS' },
      { label: 'No. of Facilities', fn: c => `<strong>${c.facilities.length}</strong>`, hl: c => c.facilities.length === maxFacilities ? 'best' : '' },
      { label: 'Key Facilities',    fn: c => c.facilities.slice(0,4).map(x => `<span class="cell-tag tag-blue">${x}</span>`).join('') },
      { cat: '📞 CONTACT' },
      { label: 'Phone',   fn: c => c.phone },
      { label: 'Email',   fn: c => `<a href="mailto:${c.email}" style="color:#1A56DB;font-size:12px">${c.email}</a>` },
      { label: 'Website', fn: c => `<a href="https://${c.website}" target="_blank" style="color:#1A56DB">${c.website}</a>` },
    ];
 
    let body = '';
    rows.forEach(row => {
      if (row.cat) {
        body += `<tr class="cat-row"><td colspan="${list.length+1}">${row.cat}</td></tr>`;
      } else {
        const cells = list.map(c => {
          const h = row.hl ? row.hl(c) : '';
          return `<td class="${h === 'best' ? 'best-cell best' : h === 'worst' ? 'worst' : ''}">${row.fn(c)}</td>`;
        }).join('');
        body += `<tr class="data-row"><td>${row.label}</td>${cells}</tr>`;
      }
    });
 
    document.getElementById('compareTable').innerHTML = header + body;
  }
 
  function resetAll() {
    [0,1,2].forEach(i => clearSlot(i));
    document.getElementById('compareSection').classList.remove('show');
    document.getElementById('resetWrap').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
 
  populateDropdowns();
</script>
</body>
</html>
